<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>광주 표준시간</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {

    width: 100vw;
    height: 100vh;

    background: black;

    overflow: hidden;

    display: flex;

    justify-content: center;

    align-items: center;

    cursor: none;

}


/* 날짜 */

#date {

    position: absolute;

    top: 7vh;

    color: white;

    font-family: Arial, Helvetica, sans-serif;

    font-size: clamp(18px, 2.5vw, 40px);

    font-weight: 600;

    opacity: 0.9;

}


/* 시간 */

#clock {

    color: white;

    font-family: Arial, Helvetica, sans-serif;

    font-size: clamp(70px, 16vw, 260px);

    font-weight: 900;

    letter-spacing: 0.04em;

    white-space: nowrap;

}



</style>

</head>


<body>


<div id="date">
2026년 01월 01일 목요일
</div>


<div id="clock">
00:00:00
</div>



<script>


function updateClock(){


    const now = new Date();


    // 대한민국 표준시(KST)

    const utc = 
    now.getTime() 
    + now.getTimezoneOffset() * 60000;


    const korea = 
    new Date(utc + 9 * 60 * 60 * 1000);



    let h = korea.getHours();

    let m = korea.getMinutes();

    let s = korea.getSeconds();



    h = String(h).padStart(2,"0");

    m = String(m).padStart(2,"0");

    s = String(s).padStart(2,"0");



    document.getElementById("clock").innerText =
    `${h}:${m}:${s}`;



    const year = korea.getFullYear();

    const month = korea.getMonth() + 1;

    const day = korea.getDate();



    const week = [
        "일요일",
        "월요일",
        "화요일",
        "수요일",
        "목요일",
        "금요일",
        "토요일"
    ][korea.getDay()];



    document.getElementById("date").innerText =
    `${year}년 ${String(month).padStart(2,"0")}월 ${String(day).padStart(2,"0")}일 ${week}`;


}



setInterval(updateClock,1000);

updateClock();




// 화면 터치 시 전체화면

document.body.addEventListener("click",()=>{


    if(document.documentElement.requestFullscreen){

        document.documentElement.requestFullscreen();

    }


});




// 화면 꺼짐 방지

async function keepAwake(){

    try{

        await navigator.wakeLock.request("screen");

    }

    catch(e){

    }

}


keepAwake();



document.addEventListener(
"visibilitychange",
()=>{

    if(document.visibilityState === "visible"){

        keepAwake();

    }

});


</script>


</body>
</html>
