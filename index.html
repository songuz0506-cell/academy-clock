<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의실 타이머 (최종)</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    background: black;
    overflow: hidden;
    cursor: none;
    font-family: Arial, Helvetica, sans-serif;
}

/* ===== 기본 구조 ===== */
.container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 2.5vh 0;
}

/* 날짜 */
#date {
    color: white;
    font-size: clamp(34px, 3.2vw, 58px);
    opacity: 0.9;
}

/* 시계 (시작 전) */
#clock {
    color: white;
    font-size: clamp(185px, 20vw, 485px);
    font-weight: 900;
    text-align: center;
    transition: all 0.4s ease;
}

/* 타이머 영역 */
#timerArea {
    text-align: center;
    opacity: 0;
    transform: scale(0.7);
    transition: all 0.5s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1vh;
}

/* 타이머 숫자 */
#timer {
    font-size: clamp(185px, 21vw, 500px);
    font-weight: 900;
    color: yellow;
    line-height: 1;
}

/* 타이머 문구 */
#timerLabel {
    font-size: clamp(40px, 4vw, 78px);
    color: white;
}

/* 버튼 */
#timerBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 18px 30px;
    font-size: 22px;
    border: 2px solid white;
    background: rgba(255,255,255,0.1);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    z-index: 10;
}

/* 로고 */
#logo {
    width: clamp(150px, 17vw, 280px);
    transition: all 0.5s ease;
}

/* ===== 타이머 모드 ===== */
body.active #logo {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 110px;
}

/* 현재시각 (여기만 수정됨: 38% → 34%) */
body.active #clock {
    position: fixed;
    top: 29%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(180px, 19vw, 500px);
}

/* 타이머 영역 */
body.active #timerArea {
    position: fixed;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%) scale(1);
    opacity: 1;
}

/* 타이머 숫자 */
body.active #timer {
    font-size: clamp(200px, 23vw, 580px);
}

/* 색상 */
.yellow { color: yellow; }
.red { color: red !important; }
</style>
</head>

<body>

<button id="timerBtn">타이머</button>

<div class="container">
    <div id="date">----</div>

    <div id="clock">00:00:00</div>

    <img id="logo" src="https://mail.google.com/mail/u/0/popout?ver=1czrxiih08qrv#attid%253Datt_19ee58ddf7af06ea_0.1_4a760a99_aca820b2_87f36659_915cd751_feebec1d%25252F1781967654048.png">

    <div id="timerArea">
        <div id="timer">00:00</div>
        <div id="timerLabel">---</div>
    </div>
</div>

<script>

/* 전체화면 */
document.body.addEventListener("click", () => {
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
});

/* 시계 */
function pad(n){ return String(n).padStart(2,"0"); }

function updateClock(){
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset()*60000;
    const k = new Date(utc + 9*60*60*1000);

    document.getElementById("clock").innerText =
        `${pad(k.getHours())}:${pad(k.getMinutes())}:${pad(k.getSeconds())}`;

    const week = ["일","월","화","수","목","금","토"][k.getDay()];

    document.getElementById("date").innerText =
        `${k.getFullYear()}년 ${pad(k.getMonth()+1)}월 ${pad(k.getDate())}일 ${week}요일`;
}
setInterval(updateClock,1000);
updateClock();

/* 타이머 */
const sequence = [
    {min:15, label:"아스", warn:3},
    {min:30, label:"하도", warn:5},
    {min:75, label:"초벌", warn:10},
    {min:15, label:"블랙", warn:3},
    {min:60, label:"묘사", warn:10},
    {min:30, label:"화이트", warn:5},
    {min:15, label:"신의한수", warn:3}
];

let idx = 0;
let endTime = null;
let running = false;

document.getElementById("timerBtn").onclick = () => {
    if(running) return;
    running = true;
    document.body.classList.add("active");
    startStep(0);
};

function startStep(i){
    idx = i;

    if(i >= sequence.length){
        resetUI();
        return;
    }

    const step = sequence[i];
    endTime = Date.now() + step.min * 60000;

    document.getElementById("timerLabel").innerText = step.label;
    document.getElementById("timer").className = "yellow";
}

setInterval(() => {
    if(!running) return;

    const step = sequence[idx];
    const diff = endTime - Date.now();

    if(diff <= 0){
        startStep(idx + 1);
        return;
    }

    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    const t = document.getElementById("timer");
    t.innerText = `${m}:${pad(s)}`;

    if(m < step.warn){
        t.className = "red";
    } else {
        t.className = "yellow";
    }
}, 1000);

function resetUI(){
    running = false;
    idx = 0;
    endTime = null;

    document.body.classList.remove("active");

    document.getElementById("timer").innerText = "00:00";
    document.getElementById("timerLabel").innerText = "---";
}
</script>

</body>
</html>
